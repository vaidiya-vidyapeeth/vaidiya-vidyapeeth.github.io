<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaidya Vidyapeeth | Certificate Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        body { background: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .brand-header { font-family: 'Cinzel', serif; }
        .serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }

        /* --- PREVIEW OVERLAY (FIXED FOR MOBILE) --- */
        .cert-container { position: relative; width: 100%; max-width: 850px; margin: 0 auto; line-height: 0; }
        
        .cert-name-overlay {
            position: absolute;
            top: 56.5%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            color: #921919;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 2vw; 
        }
        
        .qr-overlay {
            position: absolute;
            bottom: 5%; 
            right: 4%;
            width: 8%;  
            max-width: 80px; /* Prevents it from getting too big */
            background: white;
            padding: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-overlay img { width: 100% !important; height: auto !important; }

        #certCanvas, #qr_hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-[2.5rem] p-6 md:p-10 text-center shadow-2xl border-t-8 border-[#921919]">
        <header class="mb-8 text-center">
            <h1 class="text-2xl md:text-3xl brand-header text-[#921919]">VAIDYA VIDYAPEETH</h1>
            <p class="text-sm md:text-md serif-italic text-gray-500">Certificate of फलश्रुति की पाठशाला</p>
        </header>

        <div id="searchBox" class="space-y-4 max-w-sm mx-auto">
            <input type="text" id="phoneInput" class="w-full px-5 py-4 border-2 border-gray-100 rounded-2xl text-center font-bold text-xl focus:border-[#921919] outline-none transition-all" placeholder="Enter Phone Number">
            <button onclick="verify()" class="w-full bg-[#921919] text-white py-4 rounded-2xl font-bold text-lg hover:bg-[#7a1414] shadow-lg active:scale-95 transition-all">Generate Certificate</button>
        </div>

        <div id="resultView" class="hidden animate-in fade-in zoom-in duration-500">
            <div class="cert-container shadow-2xl rounded-2xl overflow-hidden mb-8 border border-gray-100">
                <img src="template.jpg" alt="Template" class="w-full">
                <div id="previewName" class="cert-name-overlay">STUDENT NAME</div>
                <div id="previewQR" class="qr-overlay"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button onclick="downloadPNG()" id="btnPNG" class="bg-gray-800 hover:bg-black text-white py-4 rounded-xl font-bold shadow transition-all">Download PNG</button>
                <button onclick="downloadPDF()" id="btnPDF" class="bg-gray-800 hover:bg-black text-white py-4 rounded-xl font-bold shadow transition-all">Download PDF</button>
                <button onclick="shareWhatsApp()" class="bg-[#25D366] hover:bg-[#128C7E] text-white py-4 rounded-xl font-bold shadow transition-all text-sm">WhatsApp Share</button>
            </div>
            
            <button onclick="window.location.reload()" class="mt-10 text-gray-400 hover:text-[#921919] font-bold underline text-xs uppercase tracking-widest transition-all">
                ← New Verification
            </button>
        </div>
    </div>

    <canvas id="certCanvas"></canvas>
    <div id="qr_hidden"></div>

    <script>
        const studentData = [
            { phone: "918957110557", name: "AKSHAY SHUKLA" },
            { phone: "1234567890", name: "SHADAB ALI" }
        ];

        let currentUser = null;
        const canvas = document.getElementById('certCanvas');
        const template = new Image();
        template.crossOrigin = "anonymous";
        template.src = 'template.jpg';

        function verify() {
            const val = document.getElementById('phoneInput').value.trim();
            currentUser = studentData.find(s => s.phone === val);

            if (!currentUser) return alert("Phone number not found.");

            document.getElementById('searchBox').classList.add('hidden');
            document.getElementById('resultView').classList.remove('hidden');
            document.getElementById('previewName').innerText = currentUser.name.toUpperCase();

            // Mobile-Friendly Preview QR
            const prevQR = document.getElementById('previewQR');
            prevQR.innerHTML = "";
            new QRCode(prevQR, { text: `Verified: ${currentUser.name}`, width: 128, height: 128 });
        }

        async function processCanvas() {
            const ctx = canvas.getContext('2d');
            canvas.width = template.width;
            canvas.height = template.height;

            const certID = `VV-2026-${currentUser.phone.slice(-3)}`;
            const date = "27 Mar 2026";

            const qr_hidden = document.getElementById('qr_hidden');
            qr_hidden.innerHTML = "";
            
            // Create the QR code
            new QRCode(qr_hidden, { 
                text: `Name: ${currentUser.name}\nID: ${certID}\nDate: ${date}`, 
                width: 256, 
                height: 256,
                correctLevel : QRCode.CorrectLevel.H 
            });

            // FIX: Wait for the QR image to actually render into the DOM
            return new Promise((resolve) => {
                const checkReady = setInterval(() => {
                    const qrImg = qr_hidden.querySelector('img');
                    if (qrImg && qrImg.complete && qrImg.naturalWidth !== 0) {
                        clearInterval(checkReady);
                        
                        ctx.drawImage(template, 0, 0);
                        ctx.font = "bold 44px 'Playfair Display', serif"; 
                        ctx.fillStyle = "#921919";
                        ctx.textAlign = "center";
                        ctx.fillText(currentUser.name.toUpperCase(), canvas.width / 2, 525);

                        const qrSize = 80;
                        ctx.fillStyle = "white";
                        ctx.fillRect(canvas.width-125, canvas.height-165, 90, 90);
                        ctx.drawImage(qrImg, canvas.width-120, canvas.height-160, qrSize, qrSize);
                        
                        ctx.font = "bold 16px Arial";
                        ctx.fillStyle = "#333";
                        ctx.textAlign = "center";
                        ctx.fillText(`ID: ${certID}`, canvas.width-80, canvas.height-55);
                        ctx.fillText(`Date: ${date}`, canvas.width-80, canvas.height-39);
                        
                        resolve();
                    }
                }, 150);
            });
        }

        async function downloadPNG() {
            const btn = document.getElementById('btnPNG');
            btn.innerText = "Processing...";
            await processCanvas();
            const link = document.createElement('a');
            link.download = `VaidyaCert_${currentUser.name}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
            btn.innerText = "Download PNG";
        }

        async function downloadPDF() {
            const btn = document.getElementById('btnPDF');
            btn.innerText = "Processing...";
            await processCanvas();
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width, canvas.height] });
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
            pdf.save(`VaidyaCert_${currentUser.name}.pdf`);
            btn.innerText = "Download PDF";
        }

        function shareWhatsApp() {
            const text = encodeURIComponent("I just verified my official certificate from Vaidya Vidyapeeth! 🎓");
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
