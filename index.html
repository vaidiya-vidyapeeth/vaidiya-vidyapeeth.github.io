        let currentUser = null;
        const canvas = document.getElementById('certCanvas');
        const template = new Image();
        template.crossOrigin = "anonymous";
        template.src = 'template.jpg';

        function verify() {
            const val = document.getElementById('phoneInput').value.trim();
            currentUser = studentData.find(s => s.phone === val);

            if (!currentUser) return alert("Phone number not found.");

            document.getElementById('searchBox').classList.add('hidden');
            document.getElementById('resultView').classList.remove('hidden');
            document.getElementById('previewName').innerText = currentUser.name.toUpperCase();

            // Mobile-Friendly Preview QR
            const prevQR = document.getElementById('previewQR');
            prevQR.innerHTML = "";
            new QRCode(prevQR, { text: `Verified: ${currentUser.name}`, width: 128, height: 128 });
        }

        async function processCanvas() {
            const ctx = canvas.getContext('2d');
            canvas.width = template.width;
            canvas.height = template.height;

            const certID = `VV-2026-${currentUser.phone.slice(-3)}`;
            const date = "27 Mar 2026";

            const qr_hidden = document.getElementById('qr_hidden');
            qr_hidden.innerHTML = "";
            
            // Create the QR code
            new QRCode(qr_hidden, { 
                text: `Name: ${currentUser.name}\nID: ${certID}\nDate: ${date}`, 
                width: 256, 
                height: 256,
                correctLevel : QRCode.CorrectLevel.H 
            });

            // FIX: Wait for the QR image to actually render into the DOM
            return new Promise((resolve) => {
                const checkReady = setInterval(() => {
                    const qrImg = qr_hidden.querySelector('img');
                    if (qrImg && qrImg.complete && qrImg.naturalWidth !== 0) {
                        clearInterval(checkReady);
                        
                        ctx.drawImage(template, 0, 0);
                        ctx.font = "bold 44px 'Playfair Display', serif"; 
                        ctx.fillStyle = "#921919";
                        ctx.textAlign = "center";
                        ctx.fillText(currentUser.name.toUpperCase(), canvas.width / 2, 525);

                        const qrSize = 80;
                        ctx.fillStyle = "white";
                        ctx.fillRect(canvas.width-125, canvas.height-165, 90, 90);
                        ctx.drawImage(qrImg, canvas.width-120, canvas.height-160, qrSize, qrSize);
                        
                        ctx.font = "bold 16px Arial";
                        ctx.fillStyle = "#333";
                        ctx.textAlign = "center";
                        ctx.fillText(`ID: ${certID}`, canvas.width-80, canvas.height-55);
                        ctx.fillText(`Date: ${date}`, canvas.width-80, canvas.height-39);
                        
                        resolve();
                    }
                }, 150);
            });
        }

        async function downloadPNG() {
            const btn = document.getElementById('btnPNG');
            btn.innerText = "Processing...";
            await processCanvas();
            const link = document.createElement('a');
            link.download = `VaidyaCert_${currentUser.name}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
            btn.innerText = "Download PNG";
        }

        async function downloadPDF() {
            const btn = document.getElementById('btnPDF');
            btn.innerText = "Processing...";
            await processCanvas();
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width, canvas.height] });
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
            pdf.save(`VaidyaCert_${currentUser.name}.pdf`);
            btn.innerText = "Download PDF";
        }

        function shareWhatsApp() {
            const text = encodeURIComponent("I just verified my official certificate from Vaidya Vidyapeeth! 🎓");
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
